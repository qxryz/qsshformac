<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title">
  <title id="title">Zhouzhou Tools</title>
  <defs>
    <mask id="weave">
      <rect width="96" height="96" fill="white"/>
      <path
        d="M30 38h54L44 78h44"
