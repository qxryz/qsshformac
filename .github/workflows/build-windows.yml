name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Go Mod Tidy
        run: go mod tidy

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build
        env:
          PRODUCTION: 'true'

      - name: Generate syso
        working-directory: build
        run: wails3 generate syso -arch ${{ matrix.arch }} -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_${{ matrix.arch }}.syso

      - name: Build Windows EXE
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o "bin/pzssh-${{ matrix.arch }}.exe"
          Remove-Item *.syso -Force -ErrorAction SilentlyContinue

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pzssh-windows-${{ matrix.arch }}
          path: bin/pzssh-${{ matrix.arch }}.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe
          generate_release_notes: true
