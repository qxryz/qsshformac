name: Build macOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Go Mod Tidy
        run: go mod tidy

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build
        env:
          PRODUCTION: 'true'

      - name: Build macOS App Bundle
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '1'
        run: wails3 task darwin:package

      - name: Zip App Bundle
        run: |
          cd bin
          zip -r "pzssh-macos-${{ matrix.arch }}.zip" pzssh.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pzssh-macos-${{ matrix.arch }}
          path: bin/pzssh-macos-${{ matrix.arch }}.zip

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
